<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control QR Liceo</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
}

h2 {
  margin-bottom: 10px;
}

h3 {
  margin-top: 0;
  margin-bottom: 20px;
}

button {
  padding: 12px 25px;
  margin: 5px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background-color: #ffffff;
  color: #2a5298;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background-color: #e0e0e0;
}

#reader {
  margin: auto;
  width: 300px;
  border: 5px solid white;
  border-radius: 10px;
  padding: 10px;
  background: black;
}

#estado {
  font-size: 18px;
  margin: 10px;
  font-weight: bold;
}

#mensaje {
  font-size: 22px;
  margin-top: 15px;
  font-weight: bold;
}
</style>

</head>

<body>

<!-- 🔊 SONIDO -->

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<h2>🏫 Liceo Luis Urbina Flores</h2>
<h3>📲 Control de Asistencia QR</h3>

<button onclick="cambiarModo('entrada')">Entrada</button> <button onclick="cambiarModo('salida')">Salida</button>

<p id="estado">Modo: ENTRADA</p>

<button onclick="activarSonido()">🔊 Activar sonido</button>

<div id="reader"></div>

<p id="mensaje"></p>

<script>

let modo = "entrada";

// 🔴 PEGA AQUÍ TU URL DE APPS SCRIPT
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxtKrJy5ofEg08UTsTCWvbrhhTGCR67pTLdicCAkkcMYTUst9WF0V-GppDfziunyloD/exec";

// 🔁 CONTROL DE DOBLE ESCANEO (3 SEGUNDOS)
let ultimo = "";
let tiempoUltimo = 0;

function cambiarModo(nuevoModo) {
  modo = nuevoModo;
  document.getElementById("estado").innerText = "Modo: " + nuevoModo.toUpperCase();
}

function activarSonido() {
  document.getElementById("beep").play();
}

async function registrar(rut) {
  const ahora = new Date();

  const data = {
    rut: rut.trim(),
    tipo: modo,
    hora: ahora.toLocaleTimeString(),
    fecha: ahora.toLocaleDateString()
  };

  fetch(URL_SCRIPT, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(() => {

    // 🎨 color según modo
    if (modo === "entrada") {
      document.body.style.backgroundColor = "#28a745";
      document.getElementById("mensaje").innerText = "✅ ENTRADA REGISTRADA";
    } else {
      document.body.style.backgroundColor = "#dc3545";
      document.getElementById("mensaje").innerText = "📤 SALIDA REGISTRADA";
    }

    setTimeout(() => {
      document.body.style.background = "linear-gradient(135deg, #1e3c72, #2a5298)";
      document.getElementById("mensaje").innerText = "";
    }, 1500);

  })
  .catch(() => alert("Error al enviar datos"));
}

function onScanSuccess(decodedText) {

  const ahora = Date.now();

  // ⛔ bloquea solo 3 segundos
  if (decodedText === ultimo && (ahora - tiempoUltimo) < 3000) return;

  ultimo = decodedText;
  tiempoUltimo = ahora;

  document.getElementById("beep").play();

  registrar(decodedText);
}

const qr = new Html5Qrcode("reader");

qr.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScanSuccess
);

</script>

</body>
</html>
